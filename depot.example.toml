# Depot File Server Configuration
# Copy this file to depot.toml and customize for your setup

server_name = "Depot"
log_level = "info"    # trace, debug, info, warn, error

# ============================================================================
# Shares - directories to make available via FTP/HTTP
# Share names are the table keys (e.g., [shares.Public])
# ============================================================================

[shares.Public]
path = "/path/to/public/files"
virtual_path = "/public"
read_only = true
description = "Public files accessible to everyone"
enabled = true

[shares.Games]
path = "/path/to/games"
virtual_path = "/games"
read_only = true
description = "Retro game collection"
enabled = true

[shares.Software]
path = "/path/to/software"
virtual_path = "/software"
read_only = true
description = "Software archive"
enabled = false                  # disabled by default

# ============================================================================
# Users - authenticated users with share access grants
# User names are the table keys (e.g., [users.alice])
# ============================================================================
# Users are managed via CLI commands (recommended):
#   depot add-user <username>        Add a new user
#   depot remove-user <username>     Remove a user
#   depot grant <username> <share>   Grant access to a share
#   depot revoke <username> <share>  Revoke access to a share
#   depot list-users                 List all users
#
# Password hashes are generated using Argon2 for security.
# Grant "*" to give access to all shares.
#
# Example user entry (do not copy - use CLI to add users):
# [users.alice]
# password_hash = "$argon2id$v=19$m=19456,t=2,p=1$..."  # Generated by CLI
# shares = ["Public", "Games"]
# description = "Alice's account"
# enabled = true

# ============================================================================
# FTP Server Configuration
# ============================================================================

[protocols.ftp]
enabled = true
bind_address = "0.0.0.0"
port = 2121
passive_port_start = 60000
passive_port_end = 60100
anonymous = true                       # Default is now true (set to false to require authentication)
banner = "Welcome to Depot FTP Server"

# When anonymous = false, FTP users are authenticated against [users.*]
# Use 'depot add-user' to create users with secure password hashes

# ============================================================================
# HTTP Server Configuration
# Designed for maximum retro compatibility (HTML 3.2, no JavaScript)
# ============================================================================

[protocols.http]
enabled = true
bind_address = "0.0.0.0"
port = 8080
require_auth = false     # Set to true to require user login (uses [users.*])
retro_compatible = false # set to true for HTML 3.2 (old browsers, no CSS)
show_file_sizes = true
show_dates = true

# Built-in themes: "modern", "terminal", "paperwhite", "ocean", 
#                  "midnight", "amber", "solarized", "highcontrast"
theme = "modern"

# Custom footer message (auto-escaped for security)
footer_message = "Files shared via Depot"

# custom_css = "body { background: pink; }"  # optional, overrides theme

# ============================================================================
# SMB/CIFS Server Configuration (Windows Network Shares)
# Enables native Windows file sharing for Win98/XP/7+ clients
# Access via: \\server\sharename or net use M: \\server\sharename
# ============================================================================

[protocols.smb]
enabled = false          # Disabled by default - enable for Windows clients
bind_address = "0.0.0.0"
port = 4450              # Use 445 for standard SMB (requires root/setcap)
netbios_name = "DEPOT"   # Server name shown in Network Neighborhood
workgroup = "WORKGROUP"  # Windows workgroup name
guest_access = true      # Allow access without username/password

# To use the standard SMB port (445), you need elevated privileges.
# Options (see README for details):
#   - Linux: sudo setcap 'cap_net_bind_service=+ep' target/release/depot
#   - Linux: Use iptables to forward port 445 -> 4450
#   - macOS: Use pfctl for port forwarding
#   - Any: Run as root (not recommended for production)

# ============================================================================
# Admin Panel Configuration
# Web-based administration interface
# ============================================================================

[admin]
enabled = true
bind_address = "127.0.0.1"             # localhost only by default for security
port = 8888
username = "admin"
password = "your-secure-password-here" # Server refuses to start with default!
